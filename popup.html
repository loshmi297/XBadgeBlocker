<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>X Badge Blocker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0c0c0f;
  --bg1:      #111116;
  --bg2:      #16161c;
  --line:     rgba(255,255,255,0.07);
  --line2:    rgba(255,255,255,0.11);
  --text:     #f0f0f2;
  --sub:      #888898;
  --dim:      #44444e;
  --on:       #f0f0f2;
  --sans:     'IBM Plex Sans', system-ui, sans-serif;
  --mono:     'IBM Plex Mono', monospace;
}

html, body {
  width: 340px;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 15px 12px;
  border-bottom: 1px solid var(--line);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.icon-wrap {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  line-height: 1;
  flex-shrink: 0;
}

.header-name {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.2px;
  color: var(--text);
}

.count-badge {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--dim);
  background: var(--bg2);
  border: 1px solid var(--line2);
  border-radius: 4px;
  padding: 2px 6px;
  letter-spacing: 0;
  transition: color 0.2s;
}
.count-badge.live { color: var(--sub); }

/* ── Tabs ───────────────────────────────────── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--line);
  padding: 0 15px;
  gap: 2px;
}

.tab {
  font-size: 11.5px;
  font-weight: 500;
  color: var(--dim);
  padding: 8px 10px 7px;
  cursor: pointer;
  border-bottom: 1.5px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
  margin-bottom: -1px;
}
.tab:hover { color: var(--sub); }
.tab.active { color: var(--text); border-bottom-color: var(--text); }

/* ── Panels ─────────────────────────────────── */
.panel { display: none; }
.panel.active { display: block; }

/* ── Preset list ────────────────────────────── */
.preset-list {
  max-height: 320px;
  overflow-y: auto;
  scrollbar-width: none;
}
.preset-list::-webkit-scrollbar { display: none; }

.preset-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 15px;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background 0.12s;
  user-select: none;
}
.preset-item:last-child { border-bottom: none; }
.preset-item:hover { background: var(--bg1); }
.preset-item:active { background: var(--bg2); }

.preset-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--bg2);
  border: 1px solid var(--line2);
  flex-shrink: 0;
  display: block;
}

.preset-text { flex: 1; min-width: 0; }
.preset-name {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}
.preset-handle {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Toggle */
.tog {
  width: 30px;
  height: 17px;
  border-radius: 100px;
  background: var(--bg2);
  border: 1px solid var(--line2);
  position: relative;
  flex-shrink: 0;
  transition: background 0.18s, border-color 0.18s;
}
.tog::after {
  content: '';
  position: absolute;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--dim);
  top: 2px;
  left: 2px;
  transition: transform 0.18s cubic-bezier(.34,1.4,.64,1), background 0.18s;
}
.preset-item.on .tog {
  background: var(--text);
  border-color: var(--text);
}
.preset-item.on .tog::after {
  background: var(--bg);
  transform: translateX(13px);
}
.preset-item.on .preset-name { color: var(--text); }
.preset-item.on .preset-handle { color: var(--sub); }

/* ── Custom panel ───────────────────────────── */
.custom-panel {
  max-height: 320px;
  overflow-y: auto;
  scrollbar-width: none;
}
.custom-panel::-webkit-scrollbar { display: none; }

.custom-empty {
  padding: 32px 15px;
  text-align: center;
  color: var(--dim);
  font-size: 12px;
  line-height: 1.8;
}

.custom-section-label {
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--dim);
  padding: 10px 15px 6px;
}

.custom-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 15px;
  border-bottom: 1px solid var(--line);
  transition: background 0.12s;
}
.custom-item:hover { background: var(--bg1); }

.custom-thumb {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--bg2);
  border: 1px solid var(--line2);
  object-fit: cover;
  flex-shrink: 0;
}

.custom-info { flex: 1; min-width: 0; }
.custom-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.custom-url {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--dim);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.rm-btn {
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  flex-shrink: 0;
  transition: color 0.15s, background 0.15s;
}
.rm-btn:hover { color: var(--text); background: var(--bg2); }

/* ── Add URL section ────────────────────────── */
.add-zone {
  padding: 10px 15px 12px;
  border-top: 1px solid var(--line);
}

.add-hint {
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 7px;
}

.add-row { display: flex; gap: 6px; }

.add-input {
  flex: 1;
  background: var(--bg1);
  border: 1px solid var(--line2);
  border-radius: 5px;
  padding: 6px 9px;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  min-width: 0;
}
.add-input::placeholder { color: var(--dim); }
.add-input:focus { border-color: rgba(255,255,255,0.2); }

.add-btn {
  background: var(--bg2);
  border: 1px solid var(--line2);
  border-radius: 5px;
  color: var(--sub);
  font-family: var(--sans);
  font-size: 11.5px;
  font-weight: 500;
  padding: 0 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.12s, color 0.12s;
}
.add-btn:hover { background: var(--line2); color: var(--text); }

/* ── Footer ─────────────────────────────────── */
.footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 8px 15px;
  border-top: 1px solid var(--line);
}

.by-link {
  display: flex;
  align-items: center;
  gap: 5px;
  text-decoration: none;
  cursor: pointer;
  opacity: 0.45;
  transition: opacity 0.15s;
  border: none;
  background: none;
  padding: 0;
}
.by-link:hover { opacity: 0.85; }

.by-text {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text);
  letter-spacing: 0;
}

.x-icon {
  width: 11px;
  height: 11px;
  flex-shrink: 0;
}

/* ── Toast ───────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 44px;
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  padding: 5px 11px;
  border-radius: 5px;
  opacity: 0;
  transition: opacity 0.15s, transform 0.15s;
  pointer-events: none;
  white-space: nowrap;
  background: var(--bg2);
  border: 1px solid var(--line2);
  color: var(--sub);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="icon-wrap">🚫</div>
    <span class="header-name">X Badge Blocker</span>
  </div>
  <span class="count-badge" id="countBadge">0 hidden</span>
</div>

<div class="tabs">
  <div class="tab active" data-tab="presets">Presets</div>
  <div class="tab" data-tab="custom">Custom</div>
</div>

<!-- Presets -->
<div class="panel active" id="panel-presets">
  <div class="preset-list" id="presetList"></div>
</div>

<!-- Custom -->
<div class="panel" id="panel-custom">
  <div class="custom-panel" id="customPanel"></div>
  <div class="add-zone">
    <div class="add-hint">Add by image URL</div>
    <div class="add-row">
      <input class="add-input" id="urlInput" placeholder="https://pbs.twimg.com/profile_images/...">
      <button class="add-btn" id="addBtn">Add</button>
    </div>
  </div>
</div>

<div class="footer">
  <button class="by-link" id="byLink" title="Visit @loshmi on X">
    <span class="by-text">by @loshmi</span>
    <svg class="x-icon" viewBox="0 0 24 24" fill="currentColor" style="color:#f0f0f2;">
      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.738-8.87L1.254 2.25H8.08l4.261 5.635 5.903-5.635zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
    </svg>
  </button>
</div>

<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
