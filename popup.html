<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>X Badge Blocker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500&family=Syne:wght@500;600;700&family=DM+Sans:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0c;
    --surface: #111114;
    --surface2: #18181d;
    --border: #1d1d24;
    --border2: #27272f;
    --text: #e2e2ec;
    --muted: #4e4e68;
    --muted2: #7070a0;
    --red: #e03c3c;
    --red-soft: rgba(224,60,60,0.1);
    --red-border: rgba(224,60,60,0.22);
    --green: #34c26a;
    --green-soft: rgba(52,194,106,0.1);
    --green-border: rgba(52,194,106,0.22);
    --blue: #4d8ef5;
  }

  body {
    width: 360px;
    height: 540px;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 13px 16px 11px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 9px;
    flex-shrink: 0;
  }

  .logo {
    width: 30px;
    height: 30px;
    background: var(--red-soft);
    border: 1px solid var(--red-border);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .header-text { flex: 1; }
  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1;
  }
  .header-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }

  .pill {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted2);
    transition: all 0.2s;
  }
  .pill.active {
    background: var(--red-soft);
    border-color: var(--red-border);
    color: var(--red);
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 9px 0;
    text-align: center;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .tab:hover { color: var(--muted2); }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--red);
  }

  /* ── Panels ── */
  .panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .panel.active { display: flex; }

  /* ── Presets Panel ── */
  .presets-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .preset-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 9px 11px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .preset-item:hover { border-color: var(--border2); background: var(--surface2); }
  .preset-item.checked { border-color: var(--red-border); background: var(--red-soft); }

  .preset-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--border2);
    border: 1px solid var(--border2);
  }

  .preset-info { flex: 1; min-width: 0; }
  .preset-name {
    font-size: 12.5px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .preset-handle {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }
  .preset-item.checked .preset-handle { color: rgba(224,60,60,0.6); }

  /* Custom toggle checkbox */
  .toggle {
    width: 34px;
    height: 19px;
    background: var(--border2);
    border-radius: 20px;
    position: relative;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .toggle::after {
    content: '';
    position: absolute;
    width: 13px;
    height: 13px;
    background: var(--muted2);
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: transform 0.2s, background 0.2s;
  }
  .preset-item.checked .toggle {
    background: var(--red);
  }
  .preset-item.checked .toggle::after {
    transform: translateX(15px);
    background: #fff;
  }

  /* ── Custom Panel ── */
  .custom-inner {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .section-label {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    margin-top: 4px;
  }

  .custom-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    margin-bottom: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    transition: border-color 0.15s;
  }
  .custom-item:hover { border-color: var(--border2); }

  .custom-thumb {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--border2);
    flex-shrink: 0;
  }
  .custom-info { flex: 1; min-width: 0; }
  .custom-label {
    font-size: 11.5px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .custom-url {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }
  .remove-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 5px;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    line-height: 1;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .remove-btn:hover { background: var(--red-soft); border-color: var(--red-border); color: var(--red); }

  .empty-state {
    padding: 28px 0;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    line-height: 2;
  }

  /* Add section */
  .add-section {
    padding: 10px 14px 13px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .add-row { display: flex; gap: 6px; }
  .add-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10.5px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .add-input::placeholder { color: var(--muted); }
  .add-input:focus { border-color: var(--border2); }
  .add-btn {
    background: var(--red-soft);
    border: 1px solid var(--red-border);
    color: var(--red);
    border-radius: 8px;
    padding: 0 13px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .add-btn:hover { background: rgba(224,60,60,0.18); }

  /* How-to hint */
  .how-hint {
    margin: 10px 14px 0;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted2);
    font-size: 10.5px;
    line-height: 1.6;
    flex-shrink: 0;
  }
  .how-hint strong { color: #6a6a94; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 11px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    font-size: 11px;
    font-weight: 500;
    padding: 5px 13px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.18s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.ok { background: var(--green-soft); border: 1px solid var(--green-border); color: var(--green); }
  .toast.err { background: var(--red-soft); border: 1px solid var(--red-border); color: var(--red); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🚫</div>
  <div class="header-text">
    <div class="header-title">X Badge Blocker</div>
    <div class="header-sub">affiliate badge filter</div>
  </div>
  <div class="pill" id="totalPill">0 hidden</div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="presets">⚡ Presets</div>
  <div class="tab" data-tab="custom">🔧 Custom</div>
</div>

<!-- PRESETS PANEL -->
<div class="panel active" id="panel-presets">
  <div class="presets-list" id="presetsList"></div>
</div>

<!-- CUSTOM PANEL -->
<div class="panel" id="panel-custom">
  <div class="how-hint">
    <strong>Right-click</strong> any badge image on X → <em>"Block this badge"</em>, or paste a badge image URL below.
  </div>
  <div class="custom-inner" id="customList"></div>
  <div class="add-section">
    <div class="section-label">Add by Image URL</div>
    <div class="add-row">
      <input class="add-input" id="urlInput" placeholder="https://pbs.twimg.com/profile_images/...">
      <button class="add-btn" id="addBtn">Add</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
